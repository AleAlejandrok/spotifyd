name: Build spotifyd (linux aarch64)

on:
  workflow_dispatch:

jobs:
  build:
    name: linux aarch64 build
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libasound2-dev \
            libssl-dev \
            libdbus-1-dev \
            libpulse-dev \
            portaudio19-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build spotifyd
        run: |
          cargo build --locked --release \
          --no-default-features \
          --features "dbus_mpris,alsa_backend"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spotifyd-linux-aarch64
          path: target/release/spotifyd
